services:
  torchenv-rocm70:
    container_name: training-rocm72-toch212
    build:
      context: .
      dockerfile: Dockerfile.public-rocm72-base
    user: root
    privileged: true
    network_mode: host
    group_add:
      - video
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    environment:
      - RCCL_FOLDER=/rccl
      - LD_LIBRARY_PATH=/rccl/build/release:${LD_LIBRARY_PATH:-}
      - TORCH_NCCL_HIGH_PRIORITY=1
      # Set driver variant for environment_info.json (since host /usr/src isn't visible)
      # Example values: "patched", "base", "mqd_vram", "default"
      - AMDGPU_DRIVER_VARIANT=${AMDGPU_DRIVER_VARIANT:-}

    volumes:
      # Mount parent directory (aorta/) to /workspace/aorta
      # Use AORTA_WORKSPACE env var if set, otherwise default to parent dir (..)
      - ${AORTA_WORKSPACE:-..}:/workspace/aorta
      # Mount custom RCCL build (optional - set RCCL_PATH env var)
      # Example: RCCL_PATH=/path/to/rccl docker compose up
      - ${RCCL_PATH:-/tmp/rccl_placeholder}:/rccl
    devices:
      - /dev/kfd
      - /dev/dri
    working_dir: /workspace/aorta
    shm_size: 17G
    ulimits:
      memlock: -1
      stack: 67108864
    stdin_open: true
    tty: true
