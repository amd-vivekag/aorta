# Experiment A: Queue Depth Race -- Mitigated (AQL=1024)
#
# Same pipeline as reproduce config, but with reduced AQL queue.
# Expected: No NaN at batch_size <= 512.
#
# Usage:
#   torchrun --nproc_per_node=2 -m aorta.race \
#       --config config/race/eval_exp_a_mitigated.yaml

mode: eval_pipelined

# TorchRec-style DLRM model
model_type: dlrm
batch_size: 512
feature_dim: 256
hidden_dim: 1024
model_layers: 4

# DLRM embedding tables
num_embedding_tables: 64
embedding_rows: 100000
embedding_dim: 128
sparse_pooling_factor: 20
over_arch_layers: 5

# Pipeline structure
use_compile: true
enable_pipelining: true
use_datadist_stream: true
simulate_metrics: true

# Still no inter-iteration sync (testing that AQL=1024 alone fixes it)
sync_policy: none

# Iterations (run longer to confirm stability)
warmup_iterations: 0
verify_iterations: 1000
log_interval: 100
stop_on_first_corruption: true

gpu_max_hw_queues: 4
pre_generate_data: true

# Reduced AQL queue depth (mitigates CPU-GPU race)
aql_queue_size: 1024
