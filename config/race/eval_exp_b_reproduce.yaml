# Experiment B: Large Batch + Pipelining NaN -- Reproduce
#
# At batch_size >= 1024, NaN persists even with AQL=1024 and full sync.
# Sync at ALL pipeline points (queue depth = 0) still produces NaN.
# Expected: NaN from the beginning at bs=4096.
#
# Usage:
#   torchrun --nproc_per_node=2 -m aorta.race \
#       --config config/race/eval_exp_b_reproduce.yaml

mode: eval_pipelined

# TorchRec-style DLRM model with large batch
model_type: dlrm
batch_size: 4096
feature_dim: 256
hidden_dim: 1024
model_layers: 4

# DLRM embedding tables
num_embedding_tables: 64
embedding_rows: 100000
embedding_dim: 128
sparse_pooling_factor: 20
over_arch_layers: 5

# Pipeline structure
use_compile: true
enable_pipelining: true
use_datadist_stream: true
simulate_metrics: true

# Sync at ALL pipeline points (proves this is NOT a timing issue)
sync_policy: all_pipeline_points

# Fewer iterations needed (NaN appears from beginning)
warmup_iterations: 0
verify_iterations: 100
log_interval: 10
stop_on_first_corruption: true

gpu_max_hw_queues: 4
pre_generate_data: true

# Reduced AQL queue (Experiment A mitigated, Experiment B still NaN)
aql_queue_size: 1024
