# SDPA Distributed Testing Configuration
# For testing SDPA backward operations across multiple nodes to detect NaN issues

logging:
  level: INFO

sdpa_test:
  # Path to SDPA input files (saved from replay_sdpa_backward.py)
  input_dir: /home/vivekag/scratch/apps/aorta_work/nan_issue/sdpa/input
  
  # Maximum number of iterations to run before stopping
  max_iterations: 1000
  
  # Device to use (cuda or cpu)
  device: cuda
  
  # Enable verbose logging
  verbose: false
  
  # Broadcast inputs from rank 0 (recommended for multi-node)
  broadcast_inputs: true
  
  # Output directory for results and logs
  output_dir: artifacts/sdpa_test

training:
  # Minimal training config for compatibility
  output_dir: artifacts/sdpa_test
  log_interval: 1
  batch_size: 1
  epochs: 1
  gradient_accumulation: 1
  mixed_precision: bf16
  grad_clip_norm: 1.0

distributed:
  # Distributed mode - use fsdp for multi-node testing
  mode: fsdp
  
  # Backend - nccl for NVIDIA/AMD GPUs
  backend: nccl
  
  # Standard distributed settings
  bucket_cap_mb: 128
  gradient_as_bucket_view: true
  static_graph: true
  find_unused_parameters: false

fsdp:
  # FSDP sharding strategy - hybrid_shard for multi-node
  # Replicates within nodes, shards across nodes
  sharding_strategy: hybrid_shard
  
  # Don't sync module states (no model to sync)
  sync_module_states: false
  
  # Standard FSDP settings
  backward_prefetch: BACKWARD_PRE
  use_orig_params: true
  limit_all_gathers: false
  forward_prefetch: false

race_experiment:
  # Hardware queue settings (optional - for race condition testing)
  # Set to 4+ to enable hardware queue parallelism
  gpu_max_hw_queues: 4
  
  # Skip warmup phases (optional)
  skip_rccl_warmup: false
  rccl_warmup_iterations: 5
  skip_training_warmup: true
  
  # Debug instrumentation (optional)
  timing_debug_logs: false
  gpu_event_timing: false
  nccl_async_diagnostic: false
  
  # Disable race injection features (not needed for SDPA testing)
  client_stream_layout: false
  h2d_memcpy_racing: false
  datadist_racing: false
  timing_skew_enabled: false
  nan_check_collectives: false

profiling:
  # Disable profiling by default (can be enabled for debugging)
  enabled: false
  wait: 0
  warmup: 0
  active: 5
  repeat: 1
  record_shapes: false
  profile_memory: false
  with_stack: false
  with_flops: false
  tensorboard: false
  chrome_trace: false
  trace_filename: sdpa_test.json
