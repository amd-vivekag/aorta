# Minimal config to reproduce NaN stream race (no debug instrumentation).

logging:
  level: INFO

training:
  epochs: 1
  batch_size: 16
  gradient_accumulation: 1
  mixed_precision: fp32    # Avoid bf16 cast overhead
  max_steps: 2             # 2 steps for comparison
  grad_clip_norm: null     # Skip grad clipping
  log_interval: 1
  output_dir: artifacts/nan_stream_race_minimal

race_experiment:
  # Client stream layout: default_stream (fwd/bwd/collectives), memcpy_stream, datadist_stream
  client_stream_layout: true

  # H2D memcpy racing (realistic pattern)
  h2d_memcpy_racing: false
  h2d_skip_sync_before_forward: true
  h2d_racing_start_step: 2

  # Datadist racing (TorchRec-style all_to_all on separate stream)
  datadist_racing: false
  datadist_skip_sync_before_collective: true
  datadist_racing_start_step: 2
  datadist_tensor_size: 10000000
  datadist_use_real_dependency: true

  h2d_split_dense_copy: false
  h2d_dense_tail_fraction: 0.5
  datadist_split_alltoall: false
  datadist_tail_fraction: 0.5
  datadist_read_tail_only: true
  inflight_read_check_enabled: false
  inflight_read_repeats: 5
  inflight_read_sample_size: 4096
  inflight_read_delay_size: 65536  # GPU delay work between reads

  # Warmup and detection
  skip_training_warmup: true   # Skip warmup for faster debug
  training_warmup_steps: 0
  warmup_batch_size: 16
  skip_rccl_warmup: true       # Skip RCCL warmup
  rccl_warmup_iterations: 0
  nan_check_collectives: true

  # Hardware queues (4+ for true parallelism)
  gpu_max_hw_queues: 4

  # Timing skew experiment (disabled for minimal repro)
  timing_skew_enabled: false

  # Debug instrumentation (disabled to avoid extra sync/logging)
  timing_debug_logs: false
  gpu_event_timing: false
  nccl_async_diagnostic: false

optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  warmup_steps: 1
  total_steps: 10

dataset:
  num_samples: 1024     # Enough samples for 8 GPUs with batch_size 16 (need at least 8*16*max_steps)
  sequence_length: 16   # Short sequences
  dense_dim: 64         # Match model
  sparse_features: 8
  vocab_size: 1000      # Match model vocab_size
  num_dense_features: 4
  seed: 42

model:
  vocab_size: 1000      # Minimal for stream debug
  embedding_dim: 32     # Minimal for stream debug
  num_dense_features: 4
  dense_dim: 64         # Minimal for stream debug
  model_dim: 64         # Minimal for stream debug
  num_heads: 2          # Minimal for stream debug
  num_layers: 1         # Single layer
  dropout: 0.0
  mlp_hidden_dim: 128   # Minimal for stream debug

fsdp:
  sharding_strategy: hybrid_shard
  backward_prefetch: BACKWARD_PRE
  use_orig_params: true
  limit_all_gathers: true
  forward_prefetch: true
  sync_module_states: true
  param_init_device: meta

distributed:
  mode: fsdp
  bucket_cap_mb: 128
  gradient_as_bucket_view: true
  static_graph: true
  find_unused_parameters: false

compile:
  enabled: false
  backend: inductor
  mode: max-autotune
  fullgraph: false
  dynamic: false
  options: {}

dataloader:
  num_workers: 0
  pin_memory: true

profiling:
  enabled: true
  wait: 0
  warmup: 0
  active: 2
  repeat: 1
  record_shapes: true
  profile_memory: false     # Skip memory profiling for speed
  with_stack: false
  with_flops: false
  tensorboard: false
  chrome_trace: true
  trace_filename: nan_stream_race.json
