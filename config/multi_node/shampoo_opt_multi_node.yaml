# Minimal config to reproduce NaN stream race (no debug instrumentation).

logging:
  level: INFO

training:
  epochs: 100
  batch_size: 1024
  gradient_accumulation: 2
  mixed_precision: bf16
  max_steps: 500
  grad_clip_norm: 1.0
  log_interval: 1
  output_dir: artifacts/nan_stream_race_minimal

race_experiment:
  # Client stream layout: default_stream (fwd/bwd/collectives), memcpy_stream, datadist_stream
  client_stream_layout: true

  # H2D memcpy racing (realistic pattern)
  h2d_memcpy_racing: true
  h2d_skip_sync_before_forward: true
  h2d_racing_start_step: 1

  # Datadist racing (TorchRec-style all_to_all on separate stream)
  datadist_racing: true
  datadist_skip_sync_before_collective: true
  datadist_racing_start_step: 1
  datadist_tensor_size: 10000000
  datadist_use_real_dependency: true

  h2d_split_dense_copy: true
  h2d_dense_tail_fraction: 0.5
  datadist_split_alltoall: true
  datadist_tail_fraction: 0.5
  datadist_read_tail_only: true
  inflight_read_check_enabled: true
  inflight_read_repeats: 5
  inflight_read_sample_size: 4096

  # Warmup and detection
  skip_training_warmup: true
  training_warmup_steps: 0
  skip_rccl_warmup: false
  rccl_warmup_iterations: 5
  nan_check_collectives: true

  # Hardware queues (4+ for true parallelism)
  gpu_max_hw_queues: 4

  # Timing skew experiment (disabled for minimal repro)
  timing_skew_enabled: false

  # Debug instrumentation (disabled to avoid extra sync/logging)
  timing_debug_logs: false
  gpu_event_timing: false
  nccl_async_diagnostic: true

optimizer:
  name: shampoo
  lr: 0.0002
  weight_decay: 0.01
  betas: [0.9, 0.985]
  eps: 1.0e-8

scheduler:
  warmup_steps: 200
  total_steps: 2200

dataset:
  num_samples: 200000
  sequence_length: 160
  dense_dim: 1024
  sparse_features: 64
  vocab_size: 350000
  num_dense_features: 32
  seed: 42

model:
  vocab_size: 350000
  embedding_dim: 256
  num_dense_features: 32
  dense_dim: 1024
  model_dim: 1024
  num_heads: 16
  num_layers: 18
  dropout: 0.1
  mlp_hidden_dim: 4096

fsdp:
  sharding_strategy: hybrid_shard
  backward_prefetch: BACKWARD_PRE
  use_orig_params: true
  limit_all_gathers: true
  forward_prefetch: true
  sync_module_states: true
  param_init_device: meta

distributed:
  mode: fsdp
  bucket_cap_mb: 128
  gradient_as_bucket_view: true
  static_graph: true
  find_unused_parameters: false

compile:
  enabled: false
  backend: inductor
  mode: max-autotune
  fullgraph: false
  dynamic: false
  options: {}

dataloader:
  num_workers: 0
  pin_memory: true

profiling:
  enabled: false
  wait: 0
  warmup: 0
  active: 20
  repeat: 1
  record_shapes: true
  profile_memory: true
  with_stack: false
  with_flops: false
  tensorboard: false
  chrome_trace: false
  trace_filename: nan_stream_race.json
