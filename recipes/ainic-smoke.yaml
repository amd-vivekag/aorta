# AINIC race smoke test -- FAST cluster sanity check.
#
# Purpose: confirm the full real path works end-to-end on a multi-node GPU
# cluster in SECONDS, instead of waiting for the full 5-cell x 16-trial x
# 200-iter matrix (ainic-gdr-flush-sdc.yaml). Exercises the SAME code path:
# real RepeatedTransformerBlock compute, real_backward gradient kernels, the
# per-layer int16 checksum detector, and real all_gather / reduce_scatter over
# the fabric -- just sized down (1 cell, 1 trial, 5 iters, smaller model).
#
# What a green smoke run proves (check metrics in the trial JSON / matrix.json):
#   compute_type == transformer        (real transformer path, not GEMM fallback)
#   layers_verified > 0                 (per-layer checksum detector actually ran)
#   layer_checksum_mismatches == 0      (clean)
#   avg_step_time_ms > 0                (real compute, not a no-op)
#   exit_status == ok, passed == true   (collectives + verify completed)
#
# Run (same command on every rank, one rank per GPU):
#   aorta triage run --recipe recipes/ainic-smoke.yaml
# Read:
#   cat triage_results/AINIC-SMOKE/race/*/matrix.md
#
# NOTE: this is a SANITY check, not a reproduction attempt -- too small/short to
# meaningfully exercise the SDC. Use ainic-gdr-flush-sdc.yaml for the real matrix.

schema_version: 1

ticket: AINIC-SMOKE
workload: race

# 1 trial, tiny iter budget -> finishes in seconds.
trials: 1
steps: 5

save_logs: true

workload_config:
  mode: fsdp
  warmup_iterations: 0
  verify_iterations: 5
  stop_on_first_corruption: false
  log_interval: 1
  dtype: bfloat16

  # Smaller shard + model than the full recipe so the smoke run is fast while
  # still exercising the real transformer block, real backward, and checksums.
  fsdp_shard_size: 250000
  simulate_compute: true
  compute_type: transformer
  model_dim: 512
  num_layers: 4
  include_backward_compute: true
  shared_layer_weights: true
  real_backward: true

cells:
  - name: smoke
    mitigations: [none]
    environment: local
    extra_env:
      NCCL_PROTO: "Simple"
      NCCL_DEBUG: "INFO"
      # Force GPUDirect RDMA on so the smoke proves the real GDR path works on
      # your cluster. Without these the banner shows "GDR 0" (host-bounce path).
      # A good smoke shows "GDR 1" in the RCCL banner.
      NCCL_NET_GDR_LEVEL: "SYS"
      NCCL_DMABUF_ENABLE: "1"
