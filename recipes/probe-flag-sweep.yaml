# Probe-mode sweep for ROCm / PyTorch runtime + diagnostic flags (issue #195,
# tracked under aorta probe #188).
#
# Runs the cartesian product mitigation_axis x diagnostic_axis across every
# cell. Each cell stamps its env-var bundle on the child process (inherit mode)
# or writes probe.env (file mode). Header comments cite flag *effect* only --
# they make no claim about which workload, customer, or investigation
# motivated registering the flag.
#
# Usage:
#   aorta probe \
#       --recipe recipes/probe-flag-sweep.yaml \
#       --output ./probe_results \
#       --ticket PROBE-FLAG-SWEEP \
#       -- \
#       <your existing launch command>
#
# Workload-internal flags (FBGEMM_*, TORCHINDUCTOR_*, EVAL_DISABLE_PIPELINING)
# live in examples/probe-flag-sidecar.json. To sweep them as well, pass
# --mitigations-file AND extend mitigation_axis with the names you want:
#   mitigation_axis:
#     - none
#     - ...existing entries...
#     - fbgemm_no_jk
#     - fbgemm_tbe_v2
#     - torchinductor_max_autotune_pointwise
# Passing --mitigations-file without editing mitigation_axis makes the
# names resolvable but does NOT add cells. Build-time SDPA/CK flags are
# not stamped here.
#
# TODO: AMD_WAIT_* family -- pending canonical env-var spelling; add to the
# registry when confirmed.
#
schema_version: 1
mode: probe

ticket: PROBE-FLAG-SWEEP

trials: 1

# Serialization-side and allocator-side runtime flags.
mitigation_axis:
  - none
  - gpu_max_hw_queues_2          # caps hardware queue parallelism
  - roc_aql_queue_size_1024      # caps CPU-GPU AQL queue depth (backpressure)
  - nccl_launch_order_implicit   # serializes RCCL launches device-wide
  - hsa_no_scratch_reclaim
  - hsa_no_sdma
  - pytorch_no_cuda_memory_caching
  - pytorch_alloc_expandable_segments
  - fa_prefer_ck
  - fa_prefer_aotriton
  - roc_signal_pool_16k
  - gpu_force_blit_copy_128
  - debug_clr_no_batch_cpu_sync
  - rccl_gfx942_cheap_fence_off

# Diagnostic / reporting flags (synchronous launches, verbose AMD logging).
diagnostic_axis:
  - none
  - hip_launch_blocking
  - amd_log_level_4

step_time_regex: null
collect_paths: []
timeout_per_trial: 1800   # 30 min cap per cell; bump if your launch needs more

env_passthrough_mode: inherit

# No explicit `confound:` block: Phase 1's verdict is exit-code only and
# `trials: 1` carries no statistical content. The probe recipe-builder
# auto-discovers the `none-none` cell as the baseline when `confound:` is
# absent. Once Phase 2 lands a step-time confound classifier, bump
# `trials:` above 1 and add the block back with an explicit threshold.
