# Single-process GPU smoke test on an emulated MI350X (mirage + rocjitsu).
#
# The whole `aorta triage run` is launched under the emulator, so the
# gpu_smoke workload's CUDA/HIP kernel executes on the simulated gfx950 with
# no physical GPU:
#
#   mirage run --profile rocjitsu-MI350X -- \
#     aorta triage run --recipe recipes/gpu-smoke-emulated.yaml
#
# Prereqs: mirage CLI (or $MIRAGE_BIN), rocjitsu (ROCJITSU_KMD_LIB), and a
# torch build for the target. Expected result: the cell PASSES.
schema_version: 1

ticket: EMU-SMOKE-001
workload: gpu_smoke

trials: 1
steps: 1

workload_config:
  n: 8
  dtype: float32

cells:
  - name: emulated-rocjitsu
    mitigations: [none]
    environment: emulated-rocjitsu
