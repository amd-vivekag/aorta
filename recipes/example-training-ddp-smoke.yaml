# Smoke-test recipe for the `training` workload with `parallelism: ddp`.
#
# `training` is a DISTRIBUTED workload but declares `min_world_size = 1`, so a
# bare `aorta run` (WORLD_SIZE=1) is a valid singleton smoke. It is NOT a
# meaningful distributed-performance signal — use it to exercise the lifecycle
# and JSON schema. For a real multi-rank DDP path, launch under torchrun
# (use the `aorta` console script; `-m aorta` is NOT a runnable module):
#
#   # validate only (no GPUs / no launcher needed):
#   aorta triage run --recipe recipes/example-training-ddp-smoke.yaml --dry-run
#
#   # bare one-rank smoke:
#   aorta run --workload training --trials 1 --steps 2
#
#   # single node, 2 ranks:
#   torchrun --standalone --nproc_per_node=2 $(which aorta) triage run \
#     --recipe recipes/example-training-ddp-smoke.yaml
#
# Results are written by rank 0 only (dispatcher gates on RANK), so multi-rank
# launches don't clobber each other. The `mlp` topology is the lightest
# lifecycle smoke and runs fine on CPU/Gloo.
schema_version: 1
ticket: EXAMPLE-TRAINING-DDP
workload: training
trials: 1
steps: 4

workload_config:
  parallelism: ddp         # ddp|fsdp
  seed: 1234
  device: auto             # auto|cuda|cpu
  dtype: bfloat16          # bfloat16|float16|float32
  batch_size: 2
  seq_len: 64
  warmup_steps: 1

  model:
    kind: mlp              # mlp|transformer|moe_transformer
    hidden_size: 256
    num_layers: 2
    vocab_size: 1024

  optimizer:
    kind: adamw
    lr: 0.0001
    weight_decay: 0.01

  checks:
    fail_on_nan_loss: true
    fail_on_nan_grad: true
    fail_on_nonfinite_output: true

cells:
  - name: baseline-local
    mitigations: [none]
    environment: local
