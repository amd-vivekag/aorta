name: Release

# Build the wheel + sdist and publish them as GitHub Release assets whenever a
# version tag (vX.Y.Z) is pushed. Customers then `pip install` the wheel
# straight from the release page. See docs/releasing.md for the maintainer flow.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required to create the release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # 3.11+ for stdlib tomllib in the version check

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify tag matches pyproject version
        run: |
          pkg_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${pkg_version}"
          echo "tag version:       ${tag_version}"
          if [ "${pkg_version}" != "${tag_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${pkg_version}. Bump 'version' in pyproject.toml and retag."
            exit 1
          fi

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
