[project]
name = "aorta-workspace"
version = "0.3.0"
description = "GPU performance benchmarking and debugging toolkit for PyTorch workloads on AMD ROCm"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "AMD ROCm Team"}]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
aorta-core = { workspace = true }
aorta-report = { workspace = true }
aorta-race = { workspace = true }
aorta-hw-queue = { workspace = true }
aorta-training = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.1.0",
    "pytest-xdist>=3.3.0",
    "pre-commit>=3.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "gpu: marks tests that require GPU",
    "rocm: marks tests that require ROCm specifically",
    "hw_queue: marks hw_queue_eval tests",
]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
